# GitLab CI — publishes the flow-catalog dashboard to GitLab Pages.
#
# This file is DORMANT until the repo has a GitLab remote. The moment you push to GitLab,
# it runs automatically and serves docs/catalog.html + catalog.json at your Pages URL —
# so everyone opens a link, the HTML can fetch the JSON (no local-file problem), and it's
# always current. No rework needed; just push.
#
# catalog.json is regenerated by the migration toolkit (Gemini) and committed alongside the
# flow it documents. CI only publishes — it does not generate.

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp docs/catalog.html public/index.html      # dashboard at the Pages root
    - cp docs/catalog.json public/catalog.json     # data the dashboard fetches
    - 'cp -r docs public/docs || true'             # per-flow / per-plan READMEs
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'   # publish only from the default branch
