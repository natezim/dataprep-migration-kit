<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dataprep Migration — Flow Catalog</title>
<style>
  :root{
    --bg:#f6f8fa; --card:#fff; --ink:#1f2328; --muted:#656d76; --line:#d0d7de;
    --accent:#0969da; --pass:#1a7f37; --passbg:#dafbe1; --prog:#9a6700; --progbg:#fff8c5;
    --todo:#6e7781; --todobg:#eaeef2; --fail:#cf222e; --failbg:#ffebe9;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{background:var(--card);border-bottom:1px solid var(--line);padding:20px 28px}
  h1{margin:0;font-size:20px}
  .sub{color:var(--muted);margin-top:4px;font-size:13px}
  .wrap{max-width:1240px;margin:0 auto;padding:24px 28px}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px 16px}
  .card .n{font-size:26px;font-weight:600}
  .card .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  input,select{padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--card);font-size:13px}
  input{flex:1;min-width:220px}
  table{width:100%;border-collapse:collapse;background:var(--card);
    border:1px solid var(--line);border-radius:8px;overflow:hidden}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:#f1f3f5;font-size:12px;text-transform:uppercase;letter-spacing:.03em;
    color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--ink)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafbfc}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .muted-link{color:var(--muted);pointer-events:none}
  code{font:12px/1.4 ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--ink)}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:500;white-space:nowrap}
  .b-pass{background:var(--passbg);color:var(--pass)}
  .b-prog{background:var(--progbg);color:var(--prog)}
  .b-todo{background:var(--todobg);color:var(--todo)}
  .b-fail{background:var(--failbg);color:var(--fail)}
  .tgt{font-size:12px;color:var(--muted)}
  footer{color:var(--muted);font-size:12px;margin-top:16px}
  .err{background:var(--failbg);border:1px solid #ffcecb;border-radius:8px;padding:16px 18px;color:#82071e}
  .err code{background:#fff;padding:1px 5px;border-radius:4px}
  @media(max-width:760px){.cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <h1>Dataprep Migration — Flow Catalog</h1>
  <div class="sub" id="sub">Live inventory of every flow being migrated off Dataprep. Auto-generated — do not edit by hand.</div>
</header>

<div class="wrap">
  <div id="app" style="display:none">
    <div class="cards">
      <div class="card"><div class="n" id="c-total">0</div><div class="l">Flows</div></div>
      <div class="card"><div class="n" id="c-pass">0</div><div class="l">Verified (parity ✓)</div></div>
      <div class="card"><div class="n" id="c-prog">0</div><div class="l">In progress</div></div>
      <div class="card"><div class="n" id="c-plans">0</div><div class="l">Plans</div></div>
    </div>
    <div class="controls">
      <input id="q" placeholder="Search flow, plan, owner, table…">
      <select id="fPlan"><option value="">All plans</option></select>
      <select id="fStatus">
        <option value="">All statuses</option>
        <option>Verified</option><option>In progress</option>
        <option>Not started</option><option>Failed</option>
      </select>
    </div>
    <table id="tbl">
      <thead><tr>
        <th data-k="plan">Plan</th>
        <th data-k="flow">Flow</th>
        <th data-k="target">Target</th>
        <th data-k="output">Source → BigQuery output</th>
        <th data-k="status">Parity</th>
        <th data-k="owner">Owner</th>
        <th data-k="updated">Last migrated</th>
        <th>Docs</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <footer id="foot"></footer>
  </div>

  <div id="error" class="err" style="display:none"></div>
</div>

<script>
// Data source = catalog.json (regenerated by the toolkit). The HTML never holds data itself.
const BADGE={"Verified":"b-pass","In progress":"b-prog","Not started":"b-todo","Failed":"b-fail"};
let FLOWS=[], sortK="plan", sortDir=1;

async function loadData(){
  try{
    const r=await fetch('./catalog.json',{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){
    // file:// fallback: if a catalog.js set window.CATALOG, use it.
    if(window.CATALOG) return window.CATALOG;
    throw e;
  }
}

function link(url,label,title){
  return url ? `<a href="${url}" title="${title||''}">${label}</a>`
             : `<span class="muted-link">${label}</span>`;
}

function render(){
  const q=document.getElementById('q'), fPlan=document.getElementById('fPlan'), fStatus=document.getElementById('fStatus');
  const term=q.value.toLowerCase(), pf=fPlan.value, sf=fStatus.value;
  let list=FLOWS.filter(d=>{
    const hay=((d.plan||'')+(d.flow||'')+(d.owner||'')+(d.output||'')+(d.source||'')).toLowerCase();
    return (!term||hay.includes(term))&&(!pf||d.plan===pf)&&(!sf||d.status===sf);
  });
  list.sort((a,b)=>String(a[sortK]??'').localeCompare(String(b[sortK]??''))*sortDir);
  document.getElementById('rows').innerHTML=list.map(d=>`<tr>
    <td>${d.plan||''}</td>
    <td><strong>${d.flow||''}</strong></td>
    <td><span class="tgt">${d.target||''}</span></td>
    <td><span class="tgt">${d.source||'—'} →</span> ${link(d.bq_url,'<code>'+(d.output||'')+'</code>','Open in BigQuery')}</td>
    <td><span class="badge ${BADGE[d.status]||'b-todo'}">${d.status||''}</span></td>
    <td>${d.owner||''}</td>
    <td>${d.updated||'—'}</td>
    <td>${link(d.docs_url,'README')}${d.parity_url?' · '+link(d.parity_url,'parity'):''}</td>
  </tr>`).join('');
  document.getElementById('foot').textContent=`Showing ${list.length} of ${FLOWS.length} flows`;
}

function init(data){
  FLOWS=data.flows||[];
  if(data.generated){
    const sub=document.getElementById('sub');
    sub.textContent=sub.textContent+`  ·  generated ${new Date(data.generated).toLocaleString()}`
      + (data.project?`  ·  project ${data.project}`:'');
  }
  const fPlan=document.getElementById('fPlan');
  [...new Set(FLOWS.map(d=>d.plan))].sort().forEach(p=>{
    const o=document.createElement('option');o.value=p;o.textContent=p;fPlan.appendChild(o);
  });
  document.getElementById('c-total').textContent=FLOWS.length;
  document.getElementById('c-pass').textContent=FLOWS.filter(d=>d.status==="Verified").length;
  document.getElementById('c-prog').textContent=FLOWS.filter(d=>d.status==="In progress").length;
  document.getElementById('c-plans').textContent=new Set(FLOWS.map(d=>d.plan)).size;
  document.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k; sortDir=(k===sortK)?-sortDir:1; sortK=k; render();
  });
  ['q','fPlan','fStatus'].forEach(id=>document.getElementById(id).addEventListener('input',render));
  document.getElementById('app').style.display='';
  render();
}

loadData().then(init).catch(()=>{
  const el=document.getElementById('error');
  el.style.display='';
  el.innerHTML=`<strong>Couldn't load <code>catalog.json</code>.</strong><br>
    Browsers block reading local files when you double-click an HTML file. Two fixes:<br>
    • <strong>Host it</strong> (GitLab Pages, a web server, or a GCS bucket) — then it just works.<br>
    • <strong>Serve locally:</strong> from this folder run <code>python -m http.server</code>,
      then open <code>http://localhost:8000/catalog.html</code>.`;
});
</script>
</body>
</html>
