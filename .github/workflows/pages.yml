# GitHub Actions — publishes the flow-catalog dashboard to GitHub Pages.
#
# This workflow is DORMANT until the repo is on GitHub with Pages enabled
# (Settings → Pages → Build and deployment → Source: GitHub Actions). Once it is, every push
# to the default branch serves docs/catalog.html (as index.html) + catalog.json at your Pages
# URL — so everyone opens a link, the HTML can fetch the JSON (no local-file problem), and it's
# always current. No rework needed; just push.
#
# catalog.json is regenerated by the migration toolkit (Gemini) and committed alongside the
# flow it documents. CI only publishes — it does not generate.

name: Publish catalog to Pages

on:
  push:
    branches: [main, master]   # default branch only
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Pages site
        run: |
          mkdir -p public
          cp docs/catalog.html public/index.html    # dashboard at the Pages root
          cp docs/catalog.json public/catalog.json   # data the dashboard fetches
          cp -r docs public/docs || true             # per-flow / per-plan READMEs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
